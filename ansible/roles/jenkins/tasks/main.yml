# =============================================================================
# Role: jenkins — Deploy Jenkins inside the Kubernetes cluster
# =============================================================================
# Jenkins runs as a standard Deployment exposed through a NodePort service.
# Persistent data is stored on the services VM over NFS so the Jenkins home
# directory survives pod restarts and reprovisioning.
# =============================================================================
---

# ---------- 1. Render the Kubernetes manifest --------------------------------
- name: Render Jenkins Kubernetes manifest
  ansible.builtin.template:
    src: jenkins-manifest.yml.j2
    dest: /tmp/jenkins-manifest.yml
    owner: root
    group: root
    mode: "0644"
  register: jenkins_manifest

# ---------- 2. Apply the manifest --------------------------------------------
- name: Apply Jenkins Kubernetes manifest
  ansible.builtin.command:
    cmd: kubectl apply -f /tmp/jenkins-manifest.yml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: jenkins_apply
  changed_when: "'created' in jenkins_apply.stdout or 'configured' in jenkins_apply.stdout"

# ---------- 3. Wait for the Deployment rollout --------------------------------
- name: Wait for Jenkins deployment rollout
  ansible.builtin.command:
    cmd: kubectl -n {{ jenkins_namespace }} rollout status deployment/jenkins --timeout=900s
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: false

# ---------- 4. Wait for Jenkins HTTP endpoint ---------------------------------
- name: Wait for Jenkins to respond
  ansible.builtin.uri:
    url: "http://{{ master_ip }}:{{ jenkins_nodeport }}/login"
    status_code: 200
    timeout: 5
  register: jenkins_health
  retries: 90
  delay: 10
  until: jenkins_health.status == 200

# ---------- 5. Find the Jenkins pod -------------------------------------------
- name: Get Jenkins pod name
  ansible.builtin.command:
    cmd: kubectl -n {{ jenkins_namespace }} get pods -l app=jenkins -o jsonpath={.items[0].metadata.name}
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: jenkins_pod_name
  changed_when: false

# ---------- 6. Retrieve the initial admin password ----------------------------
- name: Get Jenkins initial admin password
  ansible.builtin.command:
    cmd: kubectl -n {{ jenkins_namespace }} exec {{ jenkins_pod_name.stdout }} -- cat /var/jenkins_home/secrets/initialAdminPassword
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: jenkins_admin_password
  changed_when: false
  failed_when: false

- name: Display Jenkins initial admin password
  ansible.builtin.debug:
    msg: "Jenkins initial admin password: {{ jenkins_admin_password.stdout }}"
  when: jenkins_admin_password.rc == 0
