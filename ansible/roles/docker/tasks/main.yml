# =============================================================================
# Role: docker — Install Docker CE on the services VM
# =============================================================================
# Installs Docker from the official Docker repository so the services VM can
# run Gitea, Nexus, and Jenkins as containers.
# =============================================================================
---

# ---------- 1. Install prerequisites -----------------------------------------
- name: Install Docker prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true
    cache_valid_time: 3600

# ---------- 2. Add Docker GPG key -------------------------------------------
- name: Create keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Docker GPG key
  ansible.builtin.shell: |
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg

- name: Set permissions on Docker GPG key
  ansible.builtin.file:
    path: /etc/apt/keyrings/docker.gpg
    mode: "0644"

# ---------- 3. Add Docker apt repository ------------------------------------
- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    filename: docker
    state: present
    update_cache: true

# ---------- 4. Install Docker packages ---------------------------------------
- name: Install Docker CE and plugins
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present

# ---------- 5. Add vagrant user to docker group ------------------------------
- name: Add vagrant user to docker group
  ansible.builtin.user:
    name: vagrant
    groups: docker
    append: true

# ---------- 6. Enable and start Docker service -------------------------------
- name: Enable and start Docker
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true
    daemon_reload: true
